<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Panell viewer - Grup 8</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <h1>Panell de visualització</h1>

    <p style="text-align:center">
        Usuari: <strong id="user-label">---</strong>
        |
        <a href="#" onclick="logout()">Tancar sessió</a>
    </p>

    <div class="card">
        <h2 id="estado">Estat LED: ---</h2>
        <h3 id="sensor">Sensor: ---</h3>
    </div>

    <div class="card" style="width:90%; max-width:600px">
        <h2>Històric</h2>

        <button onclick="carregarHistoric('actuador')">
            Històric actuador
        </button>

        <button onclick="carregarHistoric('sensor')">
            Històric sensor
        </button>

        <table id="taula-historic">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Valor/Estat</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <p id="feedback" class="feedback"></p>
    </div>

    <script>

        // Comprovacio basica via localStorage.
        // L'auth real es la cookie de sessio.
        const username = localStorage.getItem("username");

        if (!username) {
            window.location.href = "/";
        }

        document.getElementById("user-label").innerText =
            username || "---";

        async function actualitzar() {
            try {

                // ---- Sensor ----
                const rs = await fetch("/api/sensor");

                if (rs.status === 401) {
                    // Sessio caducada al servidor
                    localStorage.clear();
                    window.location.href = "/";
                    return;
                }

                if (rs.ok) {
                    const ds = await rs.json();

                    document.getElementById("sensor").innerText =
                        "Sensor: " + ds.value;
                }

                // ---- Actuador ----
                const ra = await fetch("/api/actuator");

                if (ra.ok) {
                    const da = await ra.json();

                    document.getElementById("estado").innerText =
                        "Estat LED: " + (da.state ? "Encès" : "Apagat");
                }

            } catch (e) {
                console.error(e);
            }
        }

        async function carregarHistoric(tipus) {
            try {
                const res = await fetch(
                    `/api/historic?tipus=${tipus}`
                );

                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = "/";
                    return;
                }

                if (!res.ok) {
                    mostrarFeedback(
                        "Error carregant l'històric"
                    );
                    return;
                }

                const data = await res.json();

                let tbody = document.querySelector(
                    "#taula-historic tbody"
                );

                tbody.innerHTML = "";

                data.forEach(r => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${r.data}</td>
                            <td>${r.valor_estat}</td>
                        </tr>
                    `;
                });

            } catch (e) {
                mostrarFeedback("Error de connexió");
            }
        }

        async function logout() {
            try {
                await fetch("/api/logout", {
                    method: "POST"
                });
            } finally {
                localStorage.clear();
                window.location.href = "/";
            }
        }

        function mostrarFeedback(msg) {
            let f = document.getElementById("feedback");

            f.innerText = msg;
            f.style.opacity = "1";

            setTimeout(() => {
                f.style.opacity = "0";
            }, 3000);
        }

        actualitzar();
        setInterval(actualitzar, 2000);

    </script>

</body>
</html>
